<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI IDS — Hacker Dashboard</title>
  <style>
    :root{
      --bg:#0b0f13;
      --panel:#071018;
      --accent:#00ff99;
      --accent2:#7a5cff;
      --muted:#6b7280;
    }
    html,body{height:100%;margin:0;background:#05070a;font-family:'Courier New', monospace;color:var(--accent);}
    .wrap{max-width:1100px;margin:28px auto;padding:20px;}
    .grid{display:grid;grid-template-columns: 360px 1fr;gap:18px;margin-top:18px}
    .card{background:#071018;border-radius:12px;padding:14px;color:var(--accent);border:1px solid rgba(0,255,153,0.1)}
    .btn{padding:10px 14px;margin:8px 6px;border-radius:8px;cursor:pointer;background:#0d1217;color:var(--accent);border:1px solid rgba(0,255,153,0.3)}
    .console{height:300px;overflow:auto;background:#000;padding:10px;color:#7cffc9;font-size:12px;border-radius:8px}
    .cam-preview img{max-width:100%;border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>AI IDS — Hacker Dashboard</h2>
    <div class="grid">
      <div class="card">
        <h3>Controls</h3>
        <button class="btn" onclick="attack({inject:true})">Inject ON</button>
        <button class="btn" onclick="attack({inject:false})">Inject OFF</button>
        <button class="btn" onclick="attack({manual:true})">Manual ON</button>
        <button class="btn" onclick="attack({manual:false})">Manual OFF</button>
        <hr>
        <h3>Console</h3>
        <div id="console" class="console"></div>
      </div>

      <div class="card">
        <h3>Camera</h3>
        <div class="cam-preview">
          <img src="latest.jpg">
        </div>
        <h3>Events</h3>
        <div id="events" class="console"></div>
      </div>
    </div>
  </div>

<script>
function log(t){
  const c=document.getElementById("console");
  c.innerHTML += t+"<br>";
  c.scrollTop=c.scrollHeight;
}

async function attack(payload){
  const res=await fetch("/remote_attack",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  const j=await res.json();
  log("Sent: "+JSON.stringify(payload)+" ? "+JSON.stringify(j));
}

const s=new EventSource("/events");
s.onmessage=function(e){
  const out=document.getElementById("events");
  out.innerHTML = e.data + "<br>" + out.innerHTML;
};
</script>

</body>
</html>
